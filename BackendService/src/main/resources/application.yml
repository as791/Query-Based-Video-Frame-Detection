spring:
    application:
        name: video-service
    data:
      mongodb:
        uri: ${MONGO_URI:mongodb://host.docker.internal:27017/test}
        database: videovault
    main:
      allow-bean-definition-overriding: true
    servlet:
      multipart:
        max-file-size: 250MB
        max-request-size: 250MB
    redis:
      uri: ${REDIS_URI:redis://host.docker.internal:6379}
    security:
      oauth2:
        client:
          registration:
            google:
              client-id: ${GOOGLE_CLIENT_ID:}
              client-secret: ${GOOGLE_CLIENT_SECRET:}
              scope: openid, profile, email
    datasource:
      url: ${POSTGRES_URL:jdbc:postgresql://postgres:5432/videovault}
      username: ${POSTGRES_USER:videovault}
      password: ${POSTGRES_PASSWORD:videovault}
      driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      database-platform: org.hibernate.dialect.PostgreSQLDialect
    session:
      store-type: jdbc
      jdbc:
        initialize-schema: always


aws:
  accessKey: ${AWS_ACCESS_KEY_ID:}
  secretKey: ${AWS_SECRET_ACCESS_KEY:}
  region: ${AWS_REGION:us-east-1}
  maxConnections: 100
  connectionTimeOut: 60000

searchServiceUrl: ${SEARCH_SERVICE_URL:http://host.docker.internal:8000/search}

kms:
  key-alias-prefix: ${KMS_KEY_ALIAS_PREFIX:alias/vvault/user/}

embedder:
  url: ${EMBEDDER_URL:http://embedder:8002}

qdrant:
  url: ${QDRANT_URL:http://qdrant:6333}

vlm:
  url: ${VLM_URL:http://host.docker.internal:11434}
  model: ${VLM_MODEL:qwen2.5vl:7b}
